[build]
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  NEXT_PUBLIC_API_URL = "https://stag.api.tickspread.com"
  NEXT_PUBLIC_API_VERSION = "v1"
  NEXT_PUBLIC_RPC_URL = "https://rpc.gnosischain.com"
  NEXT_PUBLIC_SUPABASE_URL = "https://nvhqdqtlsdboctqjcelq.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52aHFkcXRsc2Rib2N0cWpjZWxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDIxNDU3ODEsImV4cCI6MjA1NzcyMTc4MX0.6kjpxGVqSQNMz3DqycuNPv_ug8sdBNKeJsN0Z3X7oLg"
  NEXT_PUBLIC_DATA_SOURCE = "supabase"
  NEXT_PUBLIC_DEBUG_MODE = "false"
  NEXT_PUBLIC_USE_DEFAULT_MOCK_METADATA = "true"
  NEXT_PUBLIC_USE_MOCK_SNAPSHOT = "false"
  NEXT_PUBLIC_USE_SUPABASE_SNAPSHOT = "true"

# Deploy previews on PRs
[context.deploy-preview]
  command = "npm install --legacy-peer-deps && npm run build"

# Branch deploys
[context.branch-deploy]
  command = "npm install --legacy-peer-deps && npm run build"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
